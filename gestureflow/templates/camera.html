<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Flow | Engine</title>
    <!-- Import beautiful Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #03030a;
            --primary: #00f0ff;
            --secondary: #ff0055;
            --text-main: #FFFFFF;
            --text-muted: #8b8b9e;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', -apple-system, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Abstract glowing background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.8;
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(0, 240, 255, 0.15);
            top: 20%;
            right: -10%;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: rgba(255, 0, 85, 0.12);
            bottom: -20%;
            left: -10%;
        }

        /* Ambient grid */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* Header */
        header {
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            height: 45px;
            width: auto;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff, #a0a0b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title span {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .college-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .college-logo-small {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            background-color: transparent;
            padding: 0;
            object-fit: cover;
        }

        .college-name-small {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-align: right;
            line-height: 1.3;
            white-space: nowrap;
        }

        .camera-screen-container {
            z-index: 10;
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 2.5rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h2 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .nav-btn.back {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            transition: color 0.2s, transform 0.2s;
            text-decoration: none;
        }

        .nav-btn.back:hover {
            color: white;
            transform: translateX(-5px);
        }

        .camera-container {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;

            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
            transition: all 0.5s ease;
        }

        .camera-container.active-glow {
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.15), 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(0, 240, 255, 0.3);
            border-color: rgba(0, 240, 255, 0.2);
        }

        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            display: none;
        }

        .camera-placeholder {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            color: var(--text-muted);
        }

        .camera-placeholder svg {
            width: 80px;
            height: 80px;
            opacity: 0.3;
        }

        .camera-placeholder span {
            font-size: 1.2rem;
            font-weight: 300;
        }

        .controls-container {
            width: 100%;
            margin-top: 2rem;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;

            background: rgba(20, 20, 25, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            box-sizing: border-box;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 600;
            font-size: 1.3rem;
        }

        .dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #ff3b30;
            box-shadow: 0 0 15px #ff3b30;
            transition: all 0.5s ease;
        }

        .dot.active {
            background-color: #00f0ff;
            box-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff;
        }

        .btn-toggle {
            padding: 1.2rem 3.5rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-toggle.start {
            background: linear-gradient(135deg, var(--primary), #00a2ff);
            box-shadow: 0 10px 25px -5px rgba(0, 240, 255, 0.4);
        }

        .btn-toggle.start:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 35px -5px rgba(0, 240, 255, 0.6);
        }

        .btn-toggle.stop {
            background: linear-gradient(135deg, #ff3b30, #ff0055);
            box-shadow: 0 10px 25px -5px rgba(255, 0, 85, 0.4);
        }

        .btn-toggle.stop:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 35px -5px rgba(255, 0, 85, 0.6);
        }

        /* Abstract Notification Orbs */
        .toast-popup {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-150px);
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 240, 255, 0.4);
            border-radius: 50px;
            padding: 1rem 2rem;
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 240, 255, 0.2);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .toast-popup.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        .toast-popup.error {
            border-color: rgba(255, 0, 85, 0.5);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 0, 85, 0.2);
        }
    </style>
</head>

<body>
    <!-- Alerts Hook -->
    <div id="toastAlert" class="toast-popup">
        <span id="toastIcon">✨</span>
        <span id="toastMsg">System Notification</span>
    </div>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-bg"></div>

    <header>
        <div class="brand-container">
            <img src="/static/images/app_logo.png" alt="Logo" class="logo">
            <h1 class="title">Gesture <span>Flow</span></h1>
        </div>
        <div class="college-info">
            <div class="college-name-small">GAYATRI VIDYA PARISHAD COLLEGE FOR DEGREE AND PG COURSES(A)</div>
            <img src="/static/images/college_logo.png" alt="College Logo" class="college-logo-small">
        </div>
    </header>

    <div class="camera-screen-container">

        <div class="header-row">
            <a href="/dashboard" class="nav-btn back">&larr; Back to Console</a>
            <h2>Engine View</h2>
        </div>

        <div class="camera-container" id="camContainer">
            <img id="videoFeed" class="camera-feed" alt="Camera Feed">
            <div class="camera-placeholder" id="placeholder">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z">
                    </path>
                </svg>
                <span>AI Core Offline. Press Initialize.</span>
            </div>
        </div>

        <div class="controls-container">
            <div class="status-indicator">
                <div class="dot" id="statusDot"></div>
                <span id="statusText">System Standing By</span>
            </div>

            <button id="toggleEngineBtn" class="btn-toggle start">Initialize</button>
        </div>

    </div>

    <script>
        let isEngineRunning = false;
        let previousRunningState = null;

        const videoFeed = document.getElementById('videoFeed');
        const placeholder = document.getElementById('placeholder');
        const toggleBtn = document.getElementById('toggleEngineBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const camContainer = document.getElementById('camContainer');
        const toastEl = document.getElementById('toastAlert');
        const toastMsg = document.getElementById('toastMsg');
        const toastIcon = document.getElementById('toastIcon');

        let toastTimeout = null;
        function showToast(msg, isError = false) {
            toastMsg.innerText = msg;
            toastIcon.innerText = isError ? "🛑" : "🚀";
            if (isError) toastEl.classList.add('error');
            else toastEl.classList.remove('error');
            
            toastEl.classList.add('show');
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 3500);
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                updateEngineUI(data.running);
            } catch (e) {
                console.error("Error fetching status", e);
            }
        }

        toggleBtn.addEventListener('click', async () => {
            const endpoint = isEngineRunning ? '/api/stop' : '/api/start';
            try {
                const res = await fetch(endpoint, { method: 'POST' });
                const data = await res.json();
                updateEngineUI(data.running);
            } catch (e) {
                console.error("Error toggling engine", e);
            }
        });

        function updateEngineUI(running) {
            // Check for state transitions to trigger gorgeous popups
            if (previousRunningState !== null && previousRunningState !== running) {
                if (running) {
                    showToast("System Online! Now you can start the controls.");
                } else {
                    showToast("Stopped. Gesture tracker has gone offline.", true);
                }
            }
            previousRunningState = running;
            isEngineRunning = running;

            if (running) {
                statusDot.classList.add('active');
                statusText.innerText = "Live: Controls Active";
                toggleBtn.innerText = "Halt System";
                toggleBtn.classList.remove('start');
                toggleBtn.classList.add('stop');
                camContainer.classList.add('active-glow');

                videoFeed.src = "/video_feed?" + new Date().getTime();
                videoFeed.style.display = 'block';
                placeholder.style.display = 'none';
            } else {
                statusDot.classList.remove('active');
                statusText.innerText = "Standby: Controls Offline";
                toggleBtn.innerText = "Initialize";
                toggleBtn.classList.remove('stop');
                toggleBtn.classList.add('start');
                camContainer.classList.remove('active-glow');

                videoFeed.src = "";
                videoFeed.style.display = 'none';
                placeholder.style.display = 'flex';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchStatus();
            // Continuously poll the backend so if the user halts the system via gesture,
            // the UI automatically visually "presses" the halt button and updates.
            setInterval(fetchStatus, 1500);
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && isEngineRunning) {
                document.getElementById('toggleEngineBtn').click();
            }
        });
    </script>
</body>

</html>
